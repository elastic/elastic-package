skip:
  reason: Broken after change in Kibana, to be fixed after https://github.com/elastic/kibana/pull/262000
  link: https://github.com/elastic/elastic-package/pull/3433
service: backend
vars:
  endpoint: "0.0.0.0:9411"
  parse_string_tags: false
  use_apm: true
assert:
  min_count: 20
# required to increase waiting time to detect all data streams (specially logs and traces)
wait_for_dynamic_streams_stable: 90s
