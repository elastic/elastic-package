service: threatstream-webhook-https
service_notify_signal: SIGHUP
input: http_endpoint
policy_template: ti_anomali
data_stream:
  vars:
    listen_address: 0.0.0.0
    listen_port: 7443
    preserve_original_event: true
    ioc_expiration_duration: 5d
    ssl: |-
      certificate: |
        {{{tls_cert "elastic-agent" indent=8}}}
      key: |
        {{{tls_key "elastic-agent" indent=8}}}
      verification_mode: none
assert:
  hit_count: 100
