format_version: 3.6.0
name: ci_input_pkg_a
title: CI Input Package A
description: >-
  Input package A for CI dual-type fixture tests. Shares input type logfile
  with ci_input_pkg_b to exercise the input name-qualifier disambiguation path
  (package-spec SVR00010).
version: 0.1.0
type: input
categories:
  - custom
conditions:
  kibana:
    version: "^8.0.0"
  elastic:
    subscription: basic
policy_templates:
  - name: ci_input_a
    type: logs
    title: CI Input A
    description: Collect logs for the dual-type composable CI fixture (first package).
    input: logfile
    template_paths:
      - input.yml.hbs
    vars:
      - name: paths
        type: text
        title: Paths
        multi: true
        required: true
        show_user: true
        default:
          - /var/log/a/*.log
owner:
  github: elastic/integrations
  type: elastic
