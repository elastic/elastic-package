title: Test Logs
type: logs
streams:
  - package: sql_input
    title: Test Logs from Input Package
    description: Collect test logs using the referenced input package.
  - input: logs
    title: Test Logs
    description: Collect test logs using the logs input.
    template_path: stream.yml.hbs
    vars:
      - name: paths
        type: text
        title: Paths
        multi: true
        required: true
        show_user: true
        default:
          - /var/log/test/*.log