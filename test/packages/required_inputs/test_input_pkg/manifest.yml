format_version: 3.6.0
name: test_input_pkg
title: Test Input Package
description: Input package used as a test fixture for template bundling.
version: 0.1.0
type: input
categories:
  - custom
conditions:
  kibana:
    version: "^8.0.0"
  elastic:
    subscription: basic
policy_templates:
  - name: test_input
    type: logs
    title: Test Input
    description: Collect test logs with a custom input template.
    input: logfile
    template_paths:
      - input.yml.hbs
      - extra.yml.hbs
    vars:
      - name: paths
        type: text
        title: Paths
        multi: true
        required: true
        show_user: true
        default:
          - /var/log/*.log
owner:
  github: elastic/integrations
  type: elastic