format_version: "3.5.8"
name: multi_deployer
title: Multi-Deployer Benchmark
version: "0.1.0"
description: Test package for system benchmarks exercising both docker and tf service deployers.
type: integration
categories: ["custom"]
conditions:
  kibana:
    version: "^8.0.0 || ^9.0.0"
policy_templates:
  - name: multi_deployer
    title: Multi-Deployer
    description: Collect logs via httpjson (docker) and filestream (tf) inputs.
    inputs:
      - type: httpjson
        title: Collect logs via HTTP JSON
        description: Collecting logs via httpjson input.
        vars:
          - name: url
            type: url
            title: URL
            description: URL of the HTTP endpoint to collect events from.
            required: true
            show_user: true
      - type: filestream
        title: Collect logs via filestream
        description: Collecting logs via filestream input.
owner:
  github: elastic/integrations
  type: elastic
