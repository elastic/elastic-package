---
description: Pipeline for multi_deployer httpjson data stream.
processors:
  - set:
      field: event.kind
      value: event
  - set:
      field: event.dataset
      value: multi_deployer.httpjson
  - set:
      field: event.module
      value: multi_deployer
on_failure:
  - set:
      field: event.kind
      value: pipeline_error
  - append:
      field: error.message
      value: >-
        Processor "{{ _ingest.on_failure_processor_type }}" with tag "{{ _ingest.on_failure_processor_tag }}"
        in pipeline "{{ _ingest.on_failure_pipeline }}" failed with message "{{ _ingest.on_failure_message }}"
