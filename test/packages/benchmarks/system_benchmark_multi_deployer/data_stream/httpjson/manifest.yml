title: Benchmark httpjson data stream
type: logs
streams:
  - input: httpjson
    title: Collect logs via HTTP JSON
    description: Collect benchmark events via httpjson input.
    template_path: httpjson.yml.hbs
    vars:
      - name: url
        type: url
        title: URL
        required: true
        show_user: true
      - name: interval
        type: text
        title: Interval
        default: 5s
        required: true
        show_user: true
      - name: tags
        type: text
        title: Tags
        multi: true
        required: true
        show_user: false
        default:
          - forwarded
          - multi_deployer-httpjson
      - name: preserve_original_event
        type: bool
        title: Preserve original event
        required: true
        show_user: true
        default: false
