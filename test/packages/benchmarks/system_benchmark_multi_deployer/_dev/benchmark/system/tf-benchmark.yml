---
description: Benchmark events ingested via tf deployer (filestream input)
input: filestream
deployer: tf
data_stream:
  name: logfile
  vars:
    paths:
      - "{{SERVICE_LOGS_DIR}}/tf-benchmark-{{TEST_RUN_ID}}.log"
warmup_time_period: 2s
wait_for_data_timeout: 5m
corpora:
  generator:
    total_events: 1000
    template:
      path: ./tf-benchmark/template.log
    config:
      path: ./tf-benchmark/config.yml
    fields:
      path: ./tf-benchmark/fields.yml
