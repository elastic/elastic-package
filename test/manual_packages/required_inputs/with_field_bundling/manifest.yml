format_version: 3.6.0
name: with_field_bundling
title: Integration With Field Bundling
description: >-
  Integration package that requires an input package, used to test field bundling.
  The input package defines additional fields (message, log.level) that are not
  present in the integration's data stream and should be bundled in.
version: 0.1.0
type: integration
categories:
  - custom
conditions:
  kibana:
    version: "^8.0.0"
  elastic:
    subscription: basic
requires:
  input:
    - package: fields_input_pkg
      version: "0.1.0"
policy_templates:
  - name: field_logs
    title: Field Logs
    description: Collect logs via field bundling input package
    data_streams:
      - field_logs
    inputs:
      - package: fields_input_pkg
        title: Collect logs via field bundling input package
        description: Use the field bundling input package to collect logs
owner:
  github: elastic/integrations
  type: elastic
