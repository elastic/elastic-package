format_version: 3.6.0
name: with_merging_dataset_override
title: Variable Merging - Dataset Var Overridden
description: >-
  Composable package whose data stream manifest sets both the root "dataset"
  field and its own data_stream.dataset var, while the imported input package
  also declares data_stream.dataset. The bundler must keep the integration's
  own var declaration instead of the one coming from the input package.
version: 0.1.0
type: integration
categories:
  - custom
conditions:
  kibana:
    version: "^9.4.0"
  elastic:
    subscription: basic
requires:
  input:
    - package: input_with_dataset_var
      version: "0.1.0"
policy_templates:
  - name: test_logs
    title: Test Logs
    description: Collect logs via input package that declares data_stream.dataset
    data_streams:
      - test_logs
    inputs:
      - package: input_with_dataset_var
        title: Collect test logs
        description: Use the input package with dataset var
owner:
  github: elastic/integrations
  type: elastic
