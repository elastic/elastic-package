format_version: 3.6.0
name: with_merging_dataset_excluded
title: Variable Merging - Dataset Var Excluded
description: >-
  Composable package whose imported input package declares data_stream.dataset.
  The bundler must exclude it from stream-level vars; it is fixed by the
  integration and must not be user-configurable.
version: 0.1.0
type: integration
categories:
  - custom
conditions:
  kibana:
    version: "^9.4.0"
  elastic:
    subscription: basic
requires:
  input:
    - package: input_with_dataset_var
      version: "0.1.0"
policy_templates:
  - name: test_logs
    title: Test Logs
    description: Collect logs via input package that declares data_stream.dataset
    data_streams:
      - test_logs
    inputs:
      - package: input_with_dataset_var
        title: Collect test logs
        description: Use the input package with dataset var
owner:
  github: elastic/integrations
  type: elastic
