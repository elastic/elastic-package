title: Sophos UTM logs
type: logs
streams:
  - input: udp
    title: Sophos UTM logs
    description: Collect Sophos UTM logs
    template_path: udp.yml.hbs
    vars:
      - name: tags
        type: text
        title: Tags
        multi: true
        required: true
        show_user: false
        default:
          - sophos-utm
          - forwarded
      - name: udp_host
        type: text
        title: UDP host to listen on
        multi: false
        required: true
        show_user: true
        default: localhost
      - name: udp_port
        type: integer
        title: UDP port to listen on
        multi: false
        required: true
        show_user: true
        default: 9549
      - name: tz_offset
        type: text
        title: Timezone offset
        multi: false
        required: false
        show_user: true
        default: UTC
      - name: preserve_original_event
        required: true
        show_user: true
        title: Preserve original event
        type: bool
        multi: false
        default: false
  - input: tcp
    title: Sophos UTM logs
    description: Collect Sophos UTM logs
    template_path: tcp.yml.hbs
    vars:
      - name: tags
        type: text
        title: Tags
        multi: true
        required: true
        show_user: false
        default:
          - sophos-utm
          - forwarded
      - name: tcp_host
        type: text
        title: TCP host to listen on
        multi: false
        required: true
        show_user: true
        default: localhost
      - name: tcp_port
        type: integer
        title: TCP port to listen on
        multi: false
        required: true
        show_user: true
        default: 9549
      - name: tz_offset
        type: text
        title: Timezone offset
        multi: false
        required: false
        show_user: true
        default: UTC
      - name: preserve_original_event
        required: true
        show_user: true
        title: Preserve original event
        type: bool
        multi: false
        default: false
  - input: logfile
    title: Sophos UTM logs
    description: Collect Sophos UTM logs from file
    vars:
      - name: paths
        type: text
        title: Paths
        multi: true
        required: true
        show_user: true
        default:
          - /var/log/sophos-utm.log
      - name: tags
        type: text
        title: Tags
        multi: true
        required: true
        show_user: false
        default:
          - sophos-utm
          - forwarded
      - name: tz_offset
        type: text
        title: Timezone offset
        multi: false
        required: false
        show_user: true
        default: UTC
      - name: preserve_original_event
        required: true
        show_user: true
        title: Preserve original event
        type: bool
        multi: false
        default: false
