format_version: "3.1.5"
name: apache
title: Apache HTTP Server
version: "3.0.0"
description: Collect logs and metrics from Apache servers with Elastic Agent.
type: integration
conditions:
  kibana:
    version: "^8.13.0 || ^9.0.0"
policy_templates:
  - name: apache
    title: Apache logs and metrics
    description: Collect logs and metrics from Apache instances
    inputs:
      - type: logfile
        title: Collect logs from Apache instances
        description: Collecting Apache access and error logs
        vars:
          - name: condition
            title: Condition
            type: text
            multi: false
            required: false
            show_user: false
      - type: apache/metrics
        title: Collect metrics from Apache instances
        description: Collecting Apache status metrics
        vars:
          - name: hosts
            type: text
            title: Hosts
            multi: true
            required: true
            show_user: true
            default:
              - http://127.0.0.1
          - name: condition
            title: Condition
            type: text
            multi: false
            required: false
            show_user: false
          - name: ssl
            type: yaml
            title: SSL Configuration
            multi: false
            required: false
            show_user: false
            default: |
              #certificate_authorities:
              #  - |
              #    -----BEGIN CERTIFICATE-----
              #    MIIDCjCCAfKgAwIBAgITJ706Mu2wJlKckpIvkWxEHvEyijANBgkqhkiG9w0BAQsF
              #    -----END CERTIFICATE-----
owner:
  type: elastic
  github: elastic/obs-infraobs-integrations
