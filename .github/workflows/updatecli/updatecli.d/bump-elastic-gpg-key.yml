---
name: Rotate Elastic GPG key
pipelineid: 'rotate-elastic-gpg-key'

actions:
  default:
    title: '[updatecli] Rotate embedded Elastic GPG key to {{ source "newFingerprint" }}'
    kind: github/pullrequest
    scmid: default
    spec:
      labels:
        - automation
        - dependency
      description: |
        This PR was opened automatically by updatecli. It updates the Elastic
        public GPG key embedded in the binary to the key currently published at
        https://artifacts.elastic.co/GPG-KEY-elasticsearch.

        **Before merging, please verify:**
        - The new fingerprint (`{{ source "newFingerprint" }}`) matches the one
          listed on https://pgp.mit.edu for key ID `D88E42B4` (Elasticsearch
          Signing Key), which is an independent source from the download URL.
        - The key file `internal/registry/elastic-gpg-key.asc` looks like a
          valid OpenPGP public key block and not something unexpected.

scms:
  default:
    kind: github
    spec:
      owner: '{{ .scm.owner }}'
      repository: '{{ .scm.repository }}'
      user: '{{ requiredEnv "GITHUB_ACTOR" }}'
      username: '{{ requiredEnv "GITHUB_ACTOR" }}'
      token: '{{ requiredEnv "GITHUB_TOKEN" }}'
      commitusingapi: true
      branch: main

sources:
  newFingerprint:
    name: Get fingerprint of upstream Elastic GPG key
    kind: shell
    spec:
      # The tool prints "new_fingerprint=<HEX>" to stdout; extract the hex value.
      command: >-
        go run ./internal/registry/gpgkey/fetch |
        awk -F= '/^new_fingerprint=/{print $2}'

targets:
  update-embedded-key:
    name: '[updatecli] Update embedded Elastic GPG key'
    kind: shell
    scmid: default
    sourceid: newFingerprint
    spec:
      # Overwrites elastic-gpg-key.asc and updates the fingerprint constant in
      # gpgkey_test.go. The source value (fingerprint) is appended as a trailing
      # argument by updatecli but is ignored by the tool.
      command: go run ./internal/registry/gpgkey/fetch
